# .governance/policy.yaml — Repository Governance Policy
# Repo: infra-base | Layer: infra | Domain: infrastructure
# Auto-generated by CodeVantaOS Governance Framework

apiVersion: governance.codevantaos.io/v1
kind: RepositoryPolicy
metadata:
  name: infra-base
  layer: infra
  domain: infrastructure
  urn: urn:codevantaos:repo:infra:base:v1

spec:
  # ── Branch Protection ──
  branch_protection:
    main:
      required_reviews: 2
      require_status_checks: true
      enforce_admins: true
      required_checks:
        - governance-validation
        - security-scan
        - ci-lint
      dismiss_stale_reviews: true
      require_code_owner_review: true

  # ── Merge Policy ──
  merge_policy:
    allowed_strategies: [squash, rebase]
    require_linear_history: true
    auto_delete_branch: true
    require_signed_commits: true

  # ── Deployment Gates ──
  deployment_gates:
    risk_level: critical
    require_approval: true
    approval_roles: ["@SRE", "@OPS", "@SEC", "@INFRA", "@CAB"]
    environments:
      - name: gke-cluster
      - name: cloudflare-edge
      - name: supabase-backend
    rollback_policy: automatic
    canary_percentage: 10

  # ── Dependency Policy ──
  dependency_policy:
    auto_merge_minor: false
    auto_merge_patch: true
    block_critical_vulnerabilities: true
    sbom_required: true
    license_allowlist:
      - MIT
      - Apache-2.0
      - BSD-2-Clause
      - BSD-3-Clause
      - ISC

  # ── Retention Policy ──
  retention:
    artifact_days: 90
    log_days: 365
    audit_trail_days: 730
