# .governance/ownership.yaml — Repository Ownership & CODEOWNERS
# Repo: infra-base | Layer: infra
# Auto-generated by CodeVantaOS Governance Framework

apiVersion: governance.codevantaos.io/v1
kind: Ownership
metadata:
  name: infra-base
  urn: urn:codevantaos:repo:infra:base:v1

spec:
  owners:
    primary: @infra-team
    security: @devsecops-team
    escalation: @platform-lead

  governance_roles:
    - @SRE
    - @OPS
    - @SEC
    - @INFRA
    - @CAB

  codeowners:
    # Root-level governance files
    - pattern: ".governance/**"
      owners: [@platform-lead]
      review_required: true

    - pattern: ".agent_hooks/**"
      owners: [@infra-team, @devsecops-team]
      review_required: true

    - pattern: "repo.automation.yaml"
      owners: [@infra-team]
      review_required: true

    - pattern: "SECURITY.md"
      owners: [@devsecops-team]
      review_required: true

    # All other files
    - pattern: "**"
      owners: [@infra-team]
      review_required: false

  escalation_matrix:
    - severity: P0-critical
      notify: [@platform-lead, @devsecops-team]
      sla_minutes: 15
    - severity: P1-high
      notify: [@infra-team, @devsecops-team]
      sla_minutes: 60
    - severity: P2-medium
      notify: [@infra-team]
      sla_minutes: 240
    - severity: P3-low
      notify: [@infra-team]
      sla_minutes: 1440

  on_call:
    rotation: weekly
    primary: @infra-team
    secondary: @devsecops-team
