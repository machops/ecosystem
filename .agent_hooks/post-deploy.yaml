# .agent_hooks/post-deploy.yaml — Post-Deploy Verification Hooks
# Repo: infra-base | Layer: infra
# Auto-generated by CodeVantaOS Governance Framework

apiVersion: hooks.codevantaos.io/v1
kind: PostDeployHook
metadata:
  name: infra-base-post-deploy
  urn: urn:codevantaos:repo:infra:base:v1

hooks:
  # ── Deployment Verification ──
  - id: deploy-verify
    name: "Deployment Health Check"
    description: "Verify deployment succeeded and services are healthy"
    targets:
      - gke-cluster
      - cloudflare-edge
      - supabase-backend
    checks:
      - type: health-endpoint
        timeout_seconds: 120
        retry_count: 3
      - type: smoke-test
        suite: post-deploy
    fail_action: rollback
    severity: critical

  # ── SBOM Generation ──
  - id: sbom-generate
    name: "SBOM Generation"
    description: "Generate Software Bill of Materials post-deploy"
    tool: syft
    format: cyclonedx-json
    output: sbom.json
    fail_action: warn
    severity: high

  # ── Provenance Attestation ──
  - id: provenance
    name: "SLSA Provenance"
    description: "Generate SLSA L3+ provenance attestation"
    tool: slsa-verifier
    sign_with: sigstore
    fail_action: block
    severity: critical

  # ── Audit Log Entry ──
  - id: audit-entry
    name: "Audit Log Update"
    description: "Record deployment event in governance audit log"
    run: |
      echo "  - timestamp: \&quot;$(date -u +%Y-%m-%dT%H:%M:%SZ)\&quot;" >> .governance/audit-log.yaml
      echo "    type: deployment" >> .governance/audit-log.yaml
      echo "    actor: ci-cd-pipeline" >> .governance/audit-log.yaml
      echo "    description: \&quot;Deployment completed\&quot;" >> .governance/audit-log.yaml
    fail_action: warn
    severity: medium
