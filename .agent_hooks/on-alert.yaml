# .agent_hooks/on-alert.yaml — Alert Response Automation
# Repo: infra-base | Layer: infra
# Auto-generated by CodeVantaOS Governance Framework

apiVersion: hooks.codevantaos.io/v1
kind: AlertHook
metadata:
  name: infra-base-on-alert
  urn: urn:codevantaos:repo:infra:base:v1

alert_handlers:
  # ── Critical Vulnerability ──
  - id: cve-critical
    trigger:
      type: vulnerability
      severity: [CRITICAL]
    actions:
      - type: create-issue
        labels: [security, critical, auto-generated]
        assignees: [@devsecops-team]
        title: "🚨 Critical CVE detected in infra-base"
      - type: notify
        channels: [slack-security, pagerduty]
        escalation: @platform-lead
      - type: trigger-workflow
        workflow: reusable-self-healing.yml
    sla_minutes: 15

  # ── High Vulnerability ──
  - id: cve-high
    trigger:
      type: vulnerability
      severity: [HIGH]
    actions:
      - type: create-issue
        labels: [security, high, auto-generated]
        assignees: [@infra-team]
        title: "⚠️ High CVE detected in infra-base"
      - type: notify
        channels: [slack-security]
    sla_minutes: 60

  # ── Compliance Drift ──
  - id: compliance-drift
    trigger:
      type: compliance
      condition: drift-detected
    actions:
      - type: create-issue
        labels: [compliance, governance, auto-generated]
        assignees: [@platform-lead]
        title: "📋 Compliance drift detected in infra-base"
      - type: trigger-workflow
        workflow: reusable-security-scan.yml
    sla_minutes: 240

  # ── SLO Breach ──
  - id: slo-breach
    trigger:
      type: slo
      condition: budget-exhausted
    actions:
      - type: create-issue
        labels: [slo, reliability, auto-generated]
        assignees: [@infra-team]
        title: "📉 SLO budget exhausted for infra-base"
      - type: notify
        channels: [slack-ops]
    sla_minutes: 30

  # ── Governance Violation ──
  - id: governance-violation
    trigger:
      type: governance
      condition: contract-violation
    actions:
      - type: create-issue
        labels: [governance, violation, auto-generated]
        assignees: [@platform-lead]
        title: "🛡️ Governance contract violation in infra-base"
      - type: block-deploy
        reason: "Governance contract violation must be resolved before deployment"
    sla_minutes: 60
