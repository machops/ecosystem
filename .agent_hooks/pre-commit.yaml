# .agent_hooks/pre-commit.yaml — Pre-Commit Automation Hooks
# Repo: infra-base | Layer: infra
# Auto-generated by CodeVantaOS Governance Framework

apiVersion: hooks.codevantaos.io/v1
kind: PreCommitHook
metadata:
  name: infra-base-pre-commit
  urn: urn:codevantaos:repo:infra:base:v1

hooks:
  # ── Governance Validation ──
  - id: governance-check
    name: "Governance Contract Validation"
    description: "Verify .governance/ directory integrity"
    run: |
      test -f .governance/policy.yaml && \
      test -f .governance/ownership.yaml && \
      test -f .governance/compliance.yaml && \
      test -f METADATA.yaml && \
      test -f URN
    fail_action: block
    severity: critical

  # ── URN Consistency ──
  - id: urn-check
    name: "URN Consistency Check"
    description: "Ensure URN file matches METADATA.yaml"
    run: |
      URN_FILE=$(cat URN)
      URN_META=$(grep '^urn:' METADATA.yaml | head -1 | awk '{{print $2}}')
      test "$URN_FILE" = "$URN_META"
    fail_action: block
    severity: high

  # ── Secret Detection ──
  - id: secret-scan
    name: "Secret Detection"
    description: "Scan for leaked secrets and credentials"
    tool: trufflehog
    config: .trufflehog-exclude.txt
    fail_action: block
    severity: critical

  # ── Lint Checks ──
  - id: yaml-lint
    name: "YAML Lint"
    run: "yamllint -c .yamllint.yml ."
    fail_action: warn
    severity: low

  - id: markdown-lint
    name: "Markdown Lint"
    run: "markdownlint -c .markdownlint.json '**/*.md'"
    fail_action: warn
    severity: low
