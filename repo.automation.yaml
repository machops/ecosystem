# repo.automation.yaml — Config-Driven Automation
# Repo: infra-base | Layer: infra
# Auto-generated by CodeVantaOS Governance Framework

apiVersion: automation.codevantaos.io/v1
kind: RepoAutomation
metadata:
  name: infra-base
  layer: infra
  urn: urn:codevantaos:repo:infra:base:v1

spec:
  # ── CI/CD Integration ──
  ci:
    provider: github-actions
    reusable_workflows:
      - uses: codevantaos/.github/.github/workflows/reusable-ci.yml@main
        with:
          run_lint: true
          run_test: true
      - uses: codevantaos/.github/.github/workflows/reusable-security-scan.yml@main
        with:
          severity: "CRITICAL,HIGH"
          enable_codeql: true
      - uses: codevantaos/.github/.github/workflows/reusable-supply-chain.yml@main
        with:
          commit_artifacts: false

  # ── Dependabot ──
  dependabot:
    enabled: true
    schedule: weekly
    auto_merge:
      patch: true
      minor: false
      major: false
    security_updates: true

  # ── Branch Automation ──
  branches:
    main:
      protection: true
      auto_merge: false
    develop:
      protection: false
      auto_merge: true
    "release/*":
      protection: true
      require_approval: true

  # ── Label Automation ──
  labels:
    auto_label:
      - pattern: ".governance/**"
        labels: [governance]
      - pattern: ".agent_hooks/**"
        labels: [automation]
      - pattern: "*.yaml"
        labels: [config]
      - pattern: "docs/**"
        labels: [documentation]

  # ── Stale Issue Management ──
  stale:
    enabled: true
    days_before_stale: 30
    days_before_close: 7
    exempt_labels: [security, critical, governance]

  # ── Notifications ──
  notifications:
    slack:
      channel: "#ci-infra"
      on: [failure, security-alert]
    email:
      recipients: [@infra-team]
      on: [deployment, security-alert]
