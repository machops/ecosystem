name: 🔐 CodeQL PR 安全掃描

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: write

jobs:
  detect-fork:
    name: 🔍 偵測 Fork 狀態
    runs-on: ubuntu-latest
    outputs:
      is_fork: ${{ steps.check.outputs.is_fork }}
    steps:
      - name: 檢查是否為 Fork PR
        id: check
        run: |
          if [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            echo "is_fork=true" >> $GITHUB_OUTPUT
            echo "⚠️  這是 Fork PR，CodeQL 將在合併後執行"
          else
            echo "is_fork=false" >> $GITHUB_OUTPUT
            echo "✅ 這是內部 PR，CodeQL 將立即執行"
          fi

  analyze-internal:
    name: 🔐 CodeQL 分析（內部 PR）
    runs-on: ubuntu-latest
    needs: detect-fork
    if: needs.detect-fork.outputs.is_fork == 'false'
    strategy:
      matrix:
        language: [ 'javascript', 'python' ]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 2
      - name: 初始化 CodeQL
        uses: github/codeql-action/init@4355270be5728d200727215978e4ba5daf8e3aa3 # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - uses: github/codeql-action/autobuild@4355270be5728d200727215978e4ba5daf8e3aa3 # v3
      - name: 執行 CodeQL 分析
        uses: github/codeql-action/analyze@4355270be5728d200727215978e4ba5daf8e3aa3 # v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

  notify-fork:
    name: 📢 通知 Fork PR 作者
    runs-on: ubuntu-latest
    needs: detect-fork
    if: needs.detect-fork.outputs.is_fork == 'true'
    steps:
      - name: 在 PR 留言說明
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔐 CodeQL 安全掃描說明

            感謝你的 PR！

            由於這是來自 Fork 的 PR，基於 GitHub 安全政策，
            CodeQL 掃描將在 PR 合併到 \`main\` 分支後自動執行。

            **掃描結果位置**：
            https://github.com/${context.repo.owner}/${context.repo.repo}/security/code-scanning

            > 這是 GitHub 的安全設計，不是錯誤。`
            })
