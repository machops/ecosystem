name: Detect Stuck Dependabot PR & Close

on:
  pull_request:
    types: [opened, synchronize]
  repository_dispatch:
    types: [repair-factory-failed]

jobs:
  detect-and-close:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Close if factory says failed
        if: github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.client_payload.pr_number,
              state: 'closed'
            });

      - name: Notify factory if stuck
        if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            // Logic to determine if PR is "stuck" would go here.
            // For now, we dispatch immediately to test the flow.
            await github.rest.repos.createDispatchEvent({
              owner: 'codevantaos',
              repo: 'codevantaos-repair-factory',
              event_type: 'dependabot-stuck-pr',
              client_payload: {
                repo: context.repo.repo,
                pr_number: context.payload.number,
                branch: context.payload.pull_request.head.ref
              }
            });
