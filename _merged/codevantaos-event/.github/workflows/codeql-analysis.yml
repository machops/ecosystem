name: 🔐 CodeQL 安全分析

on:
  push:
    branches: [ main, develop ]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: read

jobs:
  analyze:
    name: 🔍 CodeQL 分析
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'python' ]
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 2
      - name: 初始化 CodeQL
        uses: github/codeql-action/init@4355270be5728d200727215978e4ba5daf8e3aa3 # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: 自動建置
        uses: github/codeql-action/autobuild@4355270be5728d200727215978e4ba5daf8e3aa3 # v3
      - name: 執行 CodeQL 分析
        uses: github/codeql-action/analyze@4355270be5728d200727215978e4ba5daf8e3aa3 # v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
      - name: 輸出掃描摘要
        if: always()
        run: |
          echo "══════════════════════════════════"
          echo "  🔐 CodeQL 掃描完成"
          echo "══════════════════════════════════"
          echo "  語言：${{ matrix.language }}"
          echo "  分支：${{ github.ref_name }}"
          echo "  Commit：${{ github.sha }}"
          echo "  結果：前往 Security 頁面查看"
          echo "  URL：https://github.com/${{ github.repository }}/security/code-scanning"
          echo "══════════════════════════════════"
